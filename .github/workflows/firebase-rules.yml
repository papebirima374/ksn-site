name: Deploy Firestore rules

# Se declenche automatiquement quand firestore.rules ou les indexes
# changent sur la branche main. Aussi disponible en run manuel.
#
# Tant que le secret FIREBASE_TOKEN n'est pas configure, le workflow
# se termine avec un warning visible (mais PAS en echec rouge) :
# l'utilisateur peut continuer a deployer manuellement les regles dans
# Firebase Console sans que GitHub ne genere d'alerte.
on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - ".github/workflows/firebase-rules.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy rules to Firebase
    runs-on: ubuntu-latest

    # Detecte la presence du secret pour skipper proprement plus bas.
    # Astuce : impossible de tester secrets.X dans `if:`, on passe par env.
    env:
      HAS_FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN != '' }}

    steps:
      - name: Check secret availability
        run: |
          if [ "$HAS_FIREBASE_TOKEN" != "true" ]; then
            echo "::warning title=Secret manquant::FIREBASE_TOKEN n'est pas configuré sur ce repo. Voir docs/FIREBASE_AUTO_DEPLOY.md."
            echo "Le workflow s'arrête proprement — déployez manuellement les règles depuis Firebase Console pour l'instant."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        id: precheck

      - name: Checkout repo
        if: env.HAS_FIREBASE_TOKEN == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.HAS_FIREBASE_TOKEN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        if: env.HAS_FIREBASE_TOKEN == 'true'
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        if: env.HAS_FIREBASE_TOKEN == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project ksn-site \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
