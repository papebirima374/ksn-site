name: Deploy Firestore rules

# Se declenche automatiquement quand firestore.rules ou les indexes
# changent sur la branche main. Aussi disponible en run manuel.
on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - ".github/workflows/firebase-rules.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy rules to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "ERREUR : le secret FIREBASE_TOKEN n'est pas defini."
            echo "Voir docs/FIREBASE_AUTO_DEPLOY.md pour le setup."
            exit 1
          fi
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project ksn-site \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
